<!DOCTYPE html>
<html>
<head>
  <base href="/sri-lakshmi-narasimha-lodge/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sri Lakshmi Narasimha Lodge - Booking Management System">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8B4513">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SLN Lodge">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>Sri Lakshmi Narasimha Lodge</title>
  <style>
    html, body { margin:0; padding:0; background:#F5F0E8; }
    #splash {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; color: #8B4513; font-family: system-ui, sans-serif;
    }
    #splash .spinner {
      width: 40px; height: 40px;
      border: 4px solid #D4A574; border-top-color: #8B4513;
      border-radius: 50%; animation: spin .8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { display:none; background:#fdd; border:1px solid #faa; border-radius:8px; margin:20px; padding:16px; color:#c00; font-family:monospace; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div id="splash"><div class="spinner"></div>Sri Lakshmi Narasimha Lodge</div>
  <div id="error"></div>

  <script>
    // Kill ALL service workers first — forces fresh load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }

    // Catch errors on screen
    window.onerror = function(m,u,l,c,e) {
      var el = document.getElementById('error');
      el.style.display = 'block';
      var errDiv = document.getElementById('error');
      errDiv.textContent = m + '\n\n' + (e && e.stack ? e.stack : '');
      document.getElementById('splash').style.display = 'none';
    };

    // Handle promise rejections
    window.addEventListener('unhandledrejection', function(e) {
      var errDiv = document.getElementById('error');
      errDiv.style.display = 'block';
      errDiv.textContent = 'Promise: ' + (e.reason || 'unknown');
      document.getElementById('splash').style.display = 'none';
    });

    // Hide splash when Flutter boots
    window.addEventListener('flutter-first-frame', function() {
      var s = document.getElementById('splash');
      if (s) s.style.display = 'none';
    });
  </script>

  <script>
    // Long timeout: keep splash visible for 45s before showing retry message
    var loadTimer = setTimeout(function() {
      var splash = document.getElementById('splash');
      var errDiv = document.getElementById('error');
      if (splash && splash.style.display !== 'none') {
        splash.style.display = 'none';
        if (errDiv) {
          errDiv.style.display = 'block';
          errDiv.innerHTML = 'Still loading...<br><br>' +
            'If this persists, try:<br>' +
            '• Open in Chrome browser<br>' +
            '• Install the APK instead<br>' +
            '<br><button onclick="location.reload(true)" style="padding:10px 24px;background:#8B4513;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">↻ Retry</button>';
        }
      }
    }, 45000);

    // Clear the timeout if Flutter loads before it fires
    window.addEventListener('flutter-first-frame', function() {
      clearTimeout(loadTimer);
    });
  </script>

  <script src="flutter_bootstrap.js"></script>
</body>
</html>
